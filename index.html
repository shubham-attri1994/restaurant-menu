<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant Menu</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>Akarshan Restaurant</h1>

</header>



<div class="category-bar">

<button onclick="filterMenu('all')">All</button>

<button onclick="filterMenu('veg')">🥗 Veg</button>

<button onclick="filterMenu('nonveg')">🍗 Non Veg</button>

</div>



<div id="menu"></div>



<div class="cart-box">


<h2>Your Order</h2>


<div id="cart"></div>


<h3 id="total">
Total ₹0
</h3>



<input id="name" placeholder="Your Name">


<input id="table" placeholder="Table Number">


<button class="order-btn" onclick="placeOrder()">

Place Order

</button>


</div>



<script src="app.js"></script>


</body>
</html>
