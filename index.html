<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Akarshan Menu</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>
<h1>Akarshan Restaurant</h1>
</header>


<div class="buttons">

<button onclick="showMenu('all')">All</button>
<button onclick="showMenu('veg')">Veg</button>
<button onclick="showMenu('nonveg')">Non Veg</button>

</div>


<div id="items"></div>


<div class="cart">

<h2>Cart</h2>

<div id="cartItems">
Cart Empty
</div>

<h3 id="total">
Total ₹0
</h3>


<input id="customer" placeholder="Name">

<input id="table" placeholder="Table No">


<button onclick="placeOrder()">
Place Order
</button>


</div>



<script src="app.js"></script>

</body>

</html>
